# Список стадий. Сейчас нам нужен только деплой.
stages:
  - deploy

deploy-project:
  stage: deploy
  # Укажи здесь ТВОЙ тег, который ты видел в настройках GitLab (например, belingem-shell)
  tags:
    - belingem
  script:
    - echo "Начинаем деплой проекта..."
    
    # 1. Проверяем, что файлы на месте (для отладки в логах)
    - ls -la
    
    # 2. Собираем и запускаем контейнеры. 
    # -d — в фоновом режиме
    # --build — пересоберет образы, если ты изменил код (JS, Python и т.д.)
    - docker compose up -d --build
    
    # 3. Выводим список запущенных контейнеров, чтобы убедиться в успехе
    - docker ps
