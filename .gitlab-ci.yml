stages:
  - build
  - test
  - deploy
  - notification

.base_template:
  tags:
    - bellinghem
  interruptible: true
  retry:
    max: 2
    when: runner_system_failure

cache:
  key: "$CI_COMMIT_REF_SLUG" 
  paths:
    - .cache/   
  policy: pull-push
  when: 'always'
build_job:
  extends: .base_template
  stage: build
  script:
    - mkdir -p .cache/
    - echo "Фиксаируем версии инструментов сборки"
    - docker version > .cache/versions.txt
    - docker compose version >> .cache/versions.txt
    - cp .cache/versions.txt versions.txt
    - echo "Логи" > temp.log
    - echo "Конфиги" > config.json
    
  artifacts:
    paths:
      - versions.txt
      - config.json
    exclude:
      - "*.log"
    name: "build-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    access: 'developer'
    expose_as: 'Build version'
    when: on_success
lint_job:
  extends: .base_template
  stage: test
  needs: 
    - job: build_job
      artifacts: true 
  script:
    - echo "Запускаем проверку кода"
    - ls -la .cache/
    - sleep 5
    - echo "Код в порядке"

.logic_deploy:
  extends: .base_template
  stage: deploy
  needs:
    - job: build_job 
      artifacts: true
    - job: lint_job
      artifacts: false
  script:
    - echo "Проверим файлы из билда:"
    - ls -la versions.txt config.json
    - echo "Помчали деплой..."
    - docker compose up -d --build
    - echo "Список запущенных контейнеров:"
    - echo "Деплой производится на сервер -  $SERVER_IP"
    - echo "Проверка наличия пароля БД - $DB_PASSWORD"
    - docker ps > deploy_data.txt
  artifacts:
    paths:
      - deploy_data.txt
    when: always

deploy_to_dev:
  extends: .logic_deploy
  environment:
    name: development 
    url: http://dev.158.160.8.109
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

deploy_to_prod:
  extends: .logic_deploy
  environment:
    name: production
    url: http://158.160.8.109
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  


message_good:
  extends: .base_template
  stage: notification 
  rules:
    - when: on_success
  script:
    - |
      MSG="*Ох че будет 23 и 24 а * Пайплайн проекта ${CI_PROJECT_NAME}успеХ. %0A Статус: ${CI_JOB_STATUS} %0A Версия: ${CI_COMMIT_SHORT_SHA}"
      curl --fail -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "parse_mode=Markdown" \
        -d "text=${MSG}"

message_bad:
  extends: .base_template
  stage: notification
  rules:
    - when: on_failure 
  script:
    - |
      MSG="*охХХХХХХ* Пайплайн проекта ${CI_PROJECT_NAME} УПАД. %0A Статус: failure %0A [Логи](${CI_PIPELINE_URL})"
      curl --fail -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "parse_mode=Markdown" \
        -d "text=${MSG}"