stages:
  - build
  - test
  - deploy
  - notification

.base_template:
  tags:
    - bellinghem
  interruptible: true
  retry:
    max: 2
    when: runner_system_failure

cache:
  key: "$CI_COMMIT_REF_SLUG" 
  paths:
    - frontend/node_modules/
    - backend/obj/         
    - backend/bin/
    - .npm/ 

build_job:
  extends: .base_template
  stage: build
  script:
    - echo "Фиксаируем версии инструментов сборки"
    - docker version > versions.txt
    - docker compose version >> versions.txt
    - echo "Логи" > temp.log
    - echo "Конфиги" > config.json
    
  artifacts:
    paths:
      - versions.txt
      - config.json
    exclude:
      - "*.log"
    name: "build-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    access: 'developer'
    expose_as: 'Build version'
    when: on_success

build_job1:
  extends: .base_template
  stage: build
  script:
    # 1. Посмотрим что есть в проекте
    - echo "=== СТРУКТУРА ПРОЕКТА ==="
    - find . -type f -name "*.json" -o -name "*.lock" -o -name "*.yml" -o -name "*.yaml" | head -20
    - echo ""
    - echo "=== ПАПКИ ПРОЕКТА ==="
    - ls -la
    - echo ""
    
    # 2. Ищем зависимости
    - echo "=== ПОИСК ФАЙЛОВ ЗАВИСИМОСТЕЙ ==="
    - if [ -f "package.json" ]; then echo "✅ Найден package.json"; cat package.json | head -5; else echo "❌ Нет package.json"; fi
    - if [ -f "package-lock.json" ]; then echo "✅ Найден package-lock.json"; else echo "❌ Нет package-lock.json"; fi
    - if [ -f "yarn.lock" ]; then echo "✅ Найден yarn.lock"; else echo "❌ Нет yarn.lock"; fi
    - if [ -f "requirements.txt" ]; then echo "✅ Найден requirements.txt"; else echo "❌ Нет requirements.txt"; fi
    - if [ -f "Pipfile" ]; then echo "✅ Найден Pipfile"; else echo "❌ Нет Pipfile"; fi
    - if [ -f "Gemfile" ]; then echo "✅ Найден Gemfile"; else echo "❌ Нет Gemfile"; fi
    - echo ""
    
    # 3. Ищем папки с зависимостями
    - echo "=== ПАПКИ С ЗАВИСИМОСТЯМИ ==="
    - if [ -d "node_modules" ]; then echo "✅ Есть node_modules/"; du -sh node_modules/ 2>/dev/null || echo "   (папка существует)"; else echo "❌ Нет node_modules/"; fi
    - if [ -d "vendor" ]; then echo "✅ Есть vendor/"; else echo "❌ Нет vendor/"; fi
    - if [ -d ".venv" ]; then echo "✅ Есть .venv/"; else echo "❌ Нет .venv/"; fi
    - if [ -d "target" ]; then echo "✅ Есть target/"; else echo "❌ Нет target/"; fi
    - echo ""
    
    # 4. Оригинальный код
    - echo "Фиксируем версии инструментов сборки"
    - docker version > versions.txt
    - docker compose version >> versions.txt
    - echo "Логи" > temp.log
    - echo "Конфиги" > config.json
lint_job:
  extends: .base_template
  stage: test
  needs: 
    - job: build_job
      artifacts: true 
  script:
    - echo "Запускаем проверку кода"
    - sleep 5
    - echo "Код в порядке"

.logic_deploy:
  extends: .base_template
  stage: deploy
  needs:
    - job: build_job 
      artifacts: true
    - job: lint_job
      artifacts: false
  script:
    - echo "Проверим файлы из билда:"
    - ls -la versions.txt config.json
    - echo "Помчали деплой..."
    - docker compose up -d --build
    - echo "Список запущенных контейнеров:"
    - echo "Деплой производится на сервер -  $SERVER_IP"
    - echo "Проверка наличия пароля БД - $DB_PASSWORD"
    - docker ps > deploy_data.txt
  artifacts:
    paths:
      - deploy_data.txt
    when: always

deploy_to_dev:
  extends: .logic_deploy
  environment:
    name: development 
    url: http://dev.158.160.8.109
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

deploy_to_prod:
  extends: .logic_deploy
  environment:
    name: production
    url: http://158.160.8.109
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  


message_good:
  extends: .base_template
  stage: notification 
  rules:
    - when: on_success
  script:
    - |
      MSG="*Люблю тебя братанчик* Пайплайн проекта ${CI_PROJECT_NAME}успеХ. %0A Статус: ${CI_JOB_STATUS} %0A Версия: ${CI_COMMIT_SHORT_SHA}"
      curl --fail -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "parse_mode=Markdown" \
        -d "text=${MSG}"

message_bad:
  extends: .base_template
  stage: notification
  rules:
    - when: on_failure 
  script:
    - |
      MSG="*охХХХХХХ* Пайплайн проекта ${CI_PROJECT_NAME} УПАД. %0A Статус: failure %0A [Логи](${CI_PIPELINE_URL})"
      curl --fail -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "parse_mode=Markdown" \
        -d "text=${MSG}"