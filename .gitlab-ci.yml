stages:
  - build
  - deploy

cache:
  key: "$CI_COMMIT_REF_SLUG" 
  paths:
    - frontend/node_modules/
    - backend/obj/         
    - backend/bin/
    - .npm/ 

build_job:
  stage: build
  tags:
    - bellinghem
  script:
    - echo "Фиксаируем версии инструментов сборки"
    - docker version > versions.txt
    - docker compose version >> versions.txt
  artifacts:
    paths:
      - versions.txt
    expire_in: 1 day


deploy_job:
  stage: deploy 
  tags:
    - bellinghem
  environment:
    name: production 
    url: http://158.160.8.109
  script:
    - echo "Помчали деплой..."
    - docker compose up -d --build
    - echo "Список запущенных контейнеров:"
    - docker ps > deploy_data.txt
  artifacts:
    paths:
      - deploy_data.txt
    when: always
