stages:
  - build   
  - test
  - deploy 
  - verify
  - rollback 
  - pages
  - notification 
#include:
  #- template: Jobs/SAST.gitlab-ci.yml

.base_template:
  tags:
    - bellinghem
  interruptible: true
  retry:
    max: 2
    when: runner_system_failure

cache:
  key: "$CI_COMMIT_REF_SLUG" 
  paths: 
    - .cache/   
  policy: pull-push
  when: 'always'




build_job:
  extends: .base_template
  stage: build
  rules:
    - changes:
        - docker-compose.yml
        - .env
        - .gitlab-ci.yml 
        - src/**/*
      when: on_success
    - when: never 
  script:
    - mkdir -p .cache/
    - echo "Фиксаируем версии инструментов сборки"
    - docker version > .cache/versions.txt
    - docker compose version >> .cache/versions.txt
    - cp .cache/versions.txt versions.txt
    - echo "Логи" > temp.log
    - echo "Конфиги" > config.json
  
  artifacts:
    paths:
      - versions.txt
      - config.json
    exclude:
      - "*.log"
    name: "build-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    access: 'developer'
    expose_as: 'Build version'
    when: on_success





unit_test_backend:
  extends: .base_template
  stage: test
  script:
  - echo "Запускаем  xUnit тесты  для асп дот нет"
  - cd Gantt-Chart-Backend
  - dotnet test Gantt-Chart-Backend.csproj --verbosity normal
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      when: always
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always

unit_test_frontend:
  extends: .base_template
  stage: test
  script:
    - echo "ютестик фор реакт"
    - cd Gantt-Chart-Frontend
    - npm install
    - npx vitest run
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      when: always
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: always

backend_lint:
  stage: test
  needs: 
    - job: build_job
      artifacts: true 
  script:
    - cd Gantt-Chart-Backend
    - dotnet format Gantt-Chart-Backend.csproj --verify-no-changes
  when:
    manual

frontend_lint:
  stage: test
  needs: 
    - job: build_job
      artifacts: true 
  script:
    - cd Gantt-Chart-Frontend
    - npm install
    - npm run lint
  when:
    manual






.logic_deploy:
  extends: .base_template
  stage: deploy
  needs:
    - job: build_job 
      artifacts: true
    - job: frontend_lint
    - job: backend_lint
      artifacts: false
  script:
    - echo "Проверим файлы из билда:"
    - ls -la versions.txt config.json
    - echo "Помчали деплой..."
    - docker compose up -d --build
    - echo "Список запущенных контейнеров:"
    - echo "Деплой производится на сервер -  $IP"
    - echo "Проверка наличия пароля БД - $DB_PASSWORD"
    - docker ps > deploy_data.txt
  artifacts:
    paths:
      - deploy_data.txt
    when: always

deploy_to_feature:
  extends: .logic_deploy
  environment:
    name: review/$CI_COMMIT_REF_SLUG 
    url: http://feature-$CI_COMMIT_REF_SLUG.$IP 
    on_stop: stop_feature 
    auto_stop_in: 1 week  
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: manual  

stop_feature:
  extends: .base_template
  stage: deploy
  script:
    - echo "Останавливаю feature окружение $CI_ENVIRONMENT_NAME"
    - docker compose down
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    action: stop 
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

deploy_to_dev:
  extends: .logic_deploy
  environment:
    name: development 
    url: http://dev.$IP
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

deploy_to_prod:
  extends: .logic_deploy
  environment:
    name: production
    url: http://$IP
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $DB_PASSWORD != null
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $DB_PASSWORD == null
      when: never
  
verify_app:
  extends: .base_template
  stage:
    verify
  script:
    - sleep 20
    - curl --fail http://158.160.8.109/login || exit 1
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

rollback_auto:
  extends: .base_template
  stage: rollback
  script:
    - echo "Приложение не прошло проверку verify, откатываеим "
    - docker compose down 
    - docker compose up -d
  when: on_failure
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

manual_rollback:
  extends: .base_template
  stage: rollback
  script:
    - echo "ОТкатываю"
    - docker compose down
  when: manual
  environment:
    name: production




message_good:
  extends: .base_template
  stage: notification 
  rules:
    - when: on_success
  script:
    - |
      MSG="*че братан кто кого перепьет как думаешь?* Пайплайн проекта ${CI_PROJECT_NAME}успеХ. %0A Статус: ${CI_JOB_STATUS} %0A Версия: ${CI_COMMIT_SHORT_SHA}"
      curl --fail -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "parse_mode=Markdown" \
        -d "text=${MSG}"

message_bad:
  extends: .base_template
  stage: notification
  rules:
    - when: on_failure 
  script:
    - |
      MSG="*охХХХХХХ* Пайплайн проекта ${CI_PROJECT_NAME} УПАД. %0A Статус: failure %0A [Логи](${CI_PIPELINE_URL})"
      curl --fail -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_CHAT_ID}" \
        -d "parse_mode=Markdown" \
        -d "text=${MSG}"
pages:
  extends: .base_template
  stage: pages
  script:
    - mkdocs build --site-dir public
  artifacts:
    paths: 
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH