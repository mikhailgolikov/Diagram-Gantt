stages: 
  - build   
  - test
  - deploy
  - release  
  - verify
  - rollback 
  - pages 
  - notification 

include:
  - local: 'notifications.yml'

.base_template:
  tags:
    - bellinghem
  interruptible: true
  retry:
    max: 2
    when: runner_system_failure

cache:
  key: "$CI_COMMIT_REF_SLUG" 
  paths: 
    - .cache/   
  policy: pull-push
  when: 'always'




build_job:
  extends: .base_template
  stage: build
  rules:
    - when: on_success
  script: 
    - mkdir -p .cache/
    - echo "Фиксаируем версии инструментов сборки"
    - docker version > .cache/versions.txt
    - docker compose version >> .cache/versions.txt
    - cp .cache/versions.txt versions.txt
    - echo "Логи" > temp.log
    - echo "Конфиги" > config.json
  
  artifacts:
    paths:
      - versions.txt
      - config.json
    exclude:
      - "*.log"
    name: "build-$CI_COMMIT_SHORT_SHA"
    expire_in: 1 week
    access: 'developer'
    expose_as: 'Build version'
    when: on_success


code_quality_backend:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:9.0
  tags:
    - guller
  script:
    - cd Gantt-Chart-Backend
    - echo "проверяем $PWD"
    - dotnet format Gantt-Chart-Backend.csproj --report ./ 
    - mv format-report.json gl-code-quality-report-back.json
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  artifacts:
    when: always
    reports:
      codequality: gl-code-quality-report-back.json




unit_test_backend:
  extends: .base_template
  stage: test
  script:
  - echo "Запускаем  xUnit тесты  для асп дот нет"
  - cd Gantt-Chart-Backend
  - dotnet test Gantt-Chart-Backend.csproj --verbosity normal
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      when: always

unit_test_frontend:
  extends: .base_template
  stage: test
  script:
    - echo "ютестик фор реакт"
    - cd Gantt-Chart-Frontend
    - npm install
    - npx vitest run
  rules:
    - if: $CI_COMMIT_BRANCH == "test"
      when: always

backend_lint:
  stage: test
  needs: 
    - job: build_job
      artifacts: true 
  script:
    - cd Gantt-Chart-Backend
    - dotnet format Gantt-Chart-Backend.csproj --verify-no-changes
  when:
    manual

frontend_lint:
  stage: test
  needs: 
    - job: build_job
      artifacts: true 
  script:
    - cd Gantt-Chart-Frontend
    - npm install
    - npm run lint
  when:
    manual






.logic_deploy:
  extends: .base_template
  stage: deploy
  needs:
    - job: build_job 
      artifacts: true
  script:
    - echo "Проверим файлы из билда:"
    - ls -la versions.txt config.json
    - echo "Помчали деплой..."
    - docker compose up -d --build
    - echo "Список запущенных контейнеров:"
    - echo "Деплой производится на сервер -  $IP"
    - echo "Проверка наличия пароля БД - $DB_PASSWORD"
    - docker ps > deploy_data.txt
  artifacts:
    paths:
      - deploy_data.txt
    when: always

deploy_to_feature:
  extends: .logic_deploy
  environment:
    name: review/$CI_COMMIT_REF_SLUG 
    url: http://feature-$CI_COMMIT_REF_SLUG.$IP 
    on_stop: stop_feature 
    auto_stop_in: 1 week  
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH
      when: manual  

stop_feature:
  extends: .base_template
  stage: deploy
  script:
    - echo "Останавливаю feature окружение $CI_ENVIRONMENT_NAME"
    - docker compose down
  environment:
    name: review/$CI_COMMIT_REF_SLUG
    action: stop 
  when: manual
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

deploy_to_dev:
  extends: .logic_deploy
  environment:
    name: development 
    url: http://dev.$IP
  rules:
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

deploy_to_prod:
  extends: .logic_deploy
  environment:
    name: production
    url: http://$IP
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $DB_PASSWORD != null
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH && $DB_PASSWORD == null
      when: never
  
create_release:
  stage: release
  tags:
    - bellinghem
  rules:
    - if: $CI_COMMIT_TAG
  script:
    - echo "🎉 Тег $CI_COMMIT_TAG создан! Пропускаем создание релиза через API (требуется настройка токена)"
  allow_failure: true  

verify_app:
  extends: .base_template
  stage: verify
  needs:
    - job: deploy_to_dev
      optional: true  
    - job: deploy_to_prod
      optional: true  
  script:
    - sleep 20
    - curl --fail http://158.160.8.109/login || exit 1
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH 
    - if: $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH 
      when: on_success



rollback_auto:
  extends: .base_template
  stage: rollback
  script:
    - echo "Приложение не прошло проверку verify, откатываеим "
    - docker compose down 
    - docker compose up -d
  when: on_failure
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

manual_rollback:
  extends: .base_template
  stage: rollback
  script:
    - echo "ОТкатываю"
    - docker compose down
  when: manual
  environment:
    name: production




pages:
  extends: .base_template
  stage: pages
  script:
    - mkdocs build --site-dir public
  artifacts:
    paths: 
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH 